<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spatial World Models — Detailed Study Report</title>
<script src="lib/marked.min.js"></script>
<style>
:root{
  --bg:#ffffff; --ink:#1b2330; --mut:#3c4a5a; --dim:#6b7686; --line:#dde3ec;
  --acc:#1a4f8b; --head:#f3f6fb; --code:#eef2f7;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6}
#wrap{display:grid;grid-template-columns:300px 1fr;max-width:1500px;margin:0 auto}
#toc{position:sticky;top:0;align-self:start;height:100vh;overflow:auto;padding:24px 18px;border-right:1px solid var(--line);background:var(--head);font-size:13.5px}
#toc h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:0 0 10px}
#toc a{display:block;color:var(--mut);text-decoration:none;padding:3px 0;border-radius:4px}
#toc a:hover{color:var(--acc)}
#toc a.h3{padding-left:14px;font-size:12.5px;color:var(--dim)}
#doc{padding:40px 56px 120px;max-width:1000px;overflow-wrap:break-word}
#doc h1{font-size:2.1em;line-height:1.15;margin:.2em 0 .5em;letter-spacing:-.01em}
#doc h2{font-size:1.5em;margin:1.6em 0 .5em;padding-bottom:.2em;border-bottom:2px solid var(--acc);scroll-margin-top:16px}
#doc h3{font-size:1.18em;margin:1.4em 0 .4em;color:var(--ink);scroll-margin-top:16px}
#doc p{margin:.6em 0;color:var(--mut)}
#doc a{color:var(--acc);text-decoration:none;border-bottom:1px solid #bcd0e8;word-break:break-word}
#doc a:hover{border-bottom-color:var(--acc)}
#doc strong{color:var(--ink)}
#doc ul{margin:.5em 0;padding-left:1.3em}
#doc li{margin:.35em 0;color:var(--mut)}
#doc blockquote{margin:.8em 0;padding:.4em 1em;border-left:4px solid var(--acc);background:var(--head);color:var(--ink)}
#doc code{font-family:var(--mono);font-size:.88em;background:var(--code);padding:1px 5px;border-radius:4px}
#doc table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.82em;display:block;overflow-x:auto}
#doc th,#doc td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
#doc th{background:var(--head);font-weight:700}
#doc hr{border:none;border-top:1px solid var(--line);margin:2em 0}
#status{padding:60px;color:var(--dim);font-family:var(--mono)}
@media(max-width:900px){#wrap{grid-template-columns:1fr}#toc{display:none}#doc{padding:24px}}
</style>
</head>
<body>
<div id="wrap">
  <nav id="toc"><h2>Contents</h2><div id="toclinks"></div></nav>
  <main id="doc"><div id="status">Loading report…</div></main>
</div>
<script>
fetch('spatial-world-models-report.md?v=' + Date.now())
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
  .then(md => {
    document.getElementById('doc').innerHTML = marked.parse(md);
    // build TOC from h2/h3, add ids
    const toc = document.getElementById('toclinks');
    document.querySelectorAll('#doc h2, #doc h3').forEach((h, i) => {
      const id = 'sec-' + i;
      h.id = id;
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      if (h.tagName === 'H3') a.className = 'h3';
      toc.appendChild(a);
    });
  })
  .catch(e => {
    document.getElementById('doc').innerHTML =
      '<div id="status">Could not load the rendered report ('+e.message+').<br>Open the raw file instead: <a href="spatial-world-models-report.md">spatial-world-models-report.md</a></div>';
  });
</script>
</body>
</html>
